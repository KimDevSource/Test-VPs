name: "TheOfficialKim: Auto Mail-in-a-Box (Version Fixed)"

on:
  workflow_dispatch:
    inputs:
      admin_password:
        description: 'รหัสผ่าน Admin เมล'
        required: true
      domain:
        description: 'โดเมน (เช่น yourdomain.com)'
        required: true

jobs:
  terminal-job:
    # เปลี่ยนจาก latest เป็น 22.04 เพื่อให้สภาพแวดล้อมตรงกับ VPS
    runs-on: ubuntu-22.04 
    
    steps:
      - name: SSH and Auto Install on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            # เช็คเวอร์ชันเครื่องปลายทาง (VPS)
            echo "Checking VPS OS Version..."
            lsb_release -a

            # ตั้งค่าตัวแปร (Non-interactive)
            export PRIMARY_HOSTNAME="box.${{ github.event.inputs.domain }}"
            export EMAIL_ADDR="admin@${{ github.event.inputs.domain }}"
            export EMAIL_PW="${{ github.event.inputs.admin_password }}"
            export NONINTERACTIVE=1

            # อัปเดตและลง Mail-in-a-Box
            sudo apt-get update
            # ใช้คำสั่งติดตั้งที่เจาะจงสคริปต์ล่าสุดของ 22.04
            curl -s https://mailinabox.email/setup.sh | sudo -E bash

            # สรุปค่า DNS หลังติดตั้งเสร็จ
            echo "===================================================="
            echo "✅ DONE BY TheOfficialKim"
            echo "DNS A Record: box -> $(curl -s ifconfig.me)"
            echo "DNS MX Record: @ -> box.${{ github.event.inputs.domain }}"
            echo "===================================================="
