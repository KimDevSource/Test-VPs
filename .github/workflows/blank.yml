name: Setup Chrome Remote Desktop

# ส่วนนี้จะสร้างปุ่มกด และช่องให้ใส่ Code ในหน้า GitHub Actions
on:
  workflow_dispatch:
    inputs:
      crd_code:
        description: 'วาง Code จาก Google Chrome Remote Desktop (ที่ก๊อปมา)'
        required: true
        default: ''

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Remote Desktop
        run: |
          # ติดตั้งส่วนประกอบที่จำเป็น
          sudo apt update
          wget https://dl.google.com/linux/direct/chrome-remote-desktop_current_amd64.deb
          sudo apt install --assume-yes ./chrome-remote-desktop_current_amd64.deb
          sudo apt install --assume-yes xfce4 desktop-base dbus-x11
          
          # รัน Code ที่คุณกรอกลงในช่อง input
          ${{ github.event.inputs.crd_code }} --pin=123456
          
          echo "ติดตั้งเสร็จแล้ว! เช็คสถานะในหน้า Chrome Remote Desktop ได้เลย"
          echo "Made By TheOfficialKim"
