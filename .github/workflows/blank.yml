name: "TheOfficialKim: Debug & Auto Setup"

on:
  workflow_dispatch:
    inputs:
      admin_password:
        description: 'รหัสผ่าน Admin เมล'
        required: true
      domain:
        description: 'โดเมน (เช่น yourdomain.com)'
        required: true

jobs:
  terminal-job:
    runs-on: ubuntu-22.04 
    steps:
      - name: SSH and Auto Install
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          # เพิ่ม Timeout เผื่อกรณีเครื่องประมวลผลช้า
          command_timeout: 30m 
          script: |
            # 1. ปิด Process ที่ค้างอยู่ (แก้ปัญหา Apt Lock ที่พบบ่อย)
            sudo killall apt apt-get || true
            sudo rm /var/lib/apt/lists/lock || true
            sudo rm /var/cache/apt/archives/lock || true
            sudo rm /var/lib/dpkg/lock* || true
            sudo dpkg --configure -a

            # 2. ตั้งค่าตัวแปร
            export PRIMARY_HOSTNAME="box.${{ github.event.inputs.domain }}"
            export EMAIL_ADDR="admin@${{ github.event.inputs.domain }}"
            export EMAIL_PW="${{ github.event.inputs.admin_password }}"
            export NONINTERACTIVE=1

            # 3. ลองรันการติดตั้งและดัก Error
            echo "Starting installation..."
            if curl -s https://mailinabox.email/setup.sh | sudo -E bash; then
                echo "===================================================="
                echo "✅ SUCCESS BY TheOfficialKim"
                echo "A Record: box -> $(curl -s ifconfig.me)"
                echo "===================================================="
            else
                echo "❌ Installation Failed! เช็คสาเหตุด้านบน"
                exit 1
            fi
