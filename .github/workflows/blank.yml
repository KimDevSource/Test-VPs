name: "TheOfficialKim: Remote Terminal (1 Hour Session)"

on:
  workflow_dispatch:
    inputs:
      crd_code:
        description: 'วาง Code จาก Google Remote Desktop (Debian Linux)'
        required: true

jobs:
  remote-session:
    runs-on: ubuntu-22.04
    steps:
      - name: Setup Chrome Remote Desktop & UI
        run: |
          # 1. อัปเดตและลง Desktop Environment (XFCE)
          sudo apt update
          sudo apt install --assume-yes xfce4 desktop-base dbus-x11 xscreensaver

          # 2. ลง Chrome Remote Desktop
          wget https://dl.google.com/linux/direct/chrome-remote-desktop_current_amd64.deb
          sudo apt install --assume-yes ./chrome-remote-desktop_current_amd64.deb

          # 3. รันคำสั่งเชื่อมต่อที่คุณก๊อปมาจาก Google
          ${{ github.event.inputs.crd_code }} --pin=123456

      - name: Keep Online for 1 Hour
        run: |
          echo "===================================================="
          echo "🚀 เครื่องออนไลน์แล้ว! รีโมทเข้าไปจัดการได้เลย"
          echo "เวลาจะนับถอยหลัง 60 นาที นับตั้งแต่ตอนนี้..."
          echo "===================================================="
          
          # สั่งให้เครื่องรอเป็นเวลา 3600 วินาที (1 ชั่วโมง)
          sleep 3600
          
          echo "หมดเวลา 1 ชั่วโมงแล้ว ปิดเครื่องอัตโนมัติ"
