name: "TheOfficialKim: Auto Mail-in-a-Box (No IP Input)"

on:
  workflow_dispatch:
    inputs:
      admin_password:
        description: 'ตั้งรหัสผ่าน Admin เมล'
        required: true
      domain:
        description: 'โดเมนของคุณ (เช่น yourdomain.com)'
        required: true

jobs:
  terminal-job:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Auto Install
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}        # ดึง IP จาก Secrets อัตโนมัติ
          username: root
          password: ${{ secrets.VPS_PASSWORD }} # ดึงรหัสผ่าน VPS จาก Secrets อัตโนมัติ
          script: |
            # 1. ตั้งค่าข้อมูลอัตโนมัติ
            export PRIMARY_HOSTNAME="box.${{ github.event.inputs.domain }}"
            export EMAIL_ADDR="admin@${{ github.event.inputs.domain }}"
            export EMAIL_PW="${{ github.event.inputs.admin_password }}"
            export NONINTERACTIVE=1

            # 2. สั่งรันการติดตั้งใน VPS
            sudo apt-get update
            curl -s https://mailinabox.email/setup.sh | sudo -E bash

            # 3. แสดงค่า DNS ออกมาที่หน้าจอ GitHub Actions
            echo "===================================================="
            echo "✅ ติดตั้งสำเร็จโดย TheOfficialKim"
            echo "===================================================="
            echo "ให้นำค่าเหล่านี้ไปใส่ใน Cloudflare DNS (เมฆสีเทา):"
            echo ""
            echo "Type: A  | Name: box | Value: $(curl -s ifconfig.me)"
            echo "Type: MX | Name: @   | Value: box.${{ github.event.inputs.domain }} | Priority: 10"
            echo "Type: TXT| Name: @   | Value: v=spf1 mx -all"
            echo ""
            echo "Login ที่: https://box.${{ github.event.inputs.domain }}/admin"
            echo "===================================================="
