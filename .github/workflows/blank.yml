name: "TheOfficialKim: Step-by-Step Deployer"

on:
  workflow_dispatch:
    inputs:
      admin_password:
        description: 'รหัสผ่าน Admin เมล'
        required: true
      domain:
        description: 'โดเมนของคุณ'
        required: true

jobs:
  prepare-vps:
    runs-on: ubuntu-22.04
    steps:
      - name: 1. Prepare and Update VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            echo "--- กำลังเตรียมเครื่อง VPS ---"
            sudo apt-get update
            sudo DEBIAN_FRONTEND=noninteractive apt-get upgrade -y
            echo "✅ เครื่องพร้อมแล้ว"

  install-mail:
    needs: prepare-vps # รอให้เครื่องเตรียมเสร็จก่อน
    runs-on: ubuntu-22.04
    steps:
      - name: 2. Start Terminal Installation
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            echo "--- เริ่มกระบวนการติดตั้ง Mail-in-a-Box ---"
            
            # ตั้งค่าตัวแปร
            export PRIMARY_HOSTNAME="box.${{ github.event.inputs.domain }}"
            export EMAIL_ADDR="admin@${{ github.event.inputs.domain }}"
            export EMAIL_PW="${{ github.event.inputs.admin_password }}"
            export NONINTERACTIVE=1

            # รันสคริปต์ติดตั้ง
            curl -s https://mailinabox.email/setup.sh | sudo -E bash
            
            echo "===================================================="
            echo "✅ ติดตั้งสำเร็จโดย TheOfficialKim"
            echo "ตรวจสอบ DNS ได้ที่หน้า Admin ของคุณ"
            echo "===================================================="
